name: Test User Input workflow

on:
  workflow_dispatch:
    inputs:
      number1:
        description: 'First number'
        default: '0'
        required: true
        type: number # Added type for validation
      number2:
        description: 'Second number'
        default: '0'
        required: true
        type: number # Added type for validation

jobs:
  add_numbers:
    runs-on: ubuntu-latest

    steps:
      - name: Add numbers
        id: calculate_step # Renamed ID for clarity
        # The syntax must be: "key=value" >> $GITHUB_OUTPUT
        run: echo "sum_result=$((${{ inputs.number1 }} + ${{ inputs.number2 }}))" >> $GITHUB_OUTPUT
        
      - name: Display sum
        # Access using: steps.<id>.outputs.<key>
        run: |
          echo "The sum of ${{ inputs.number1 }} and ${{ inputs.number2 }} is ${{ steps.calculate_step.outputs.sum_result }}"
